<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ERD</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0b1220; font-family: "Segoe UI", system-ui, sans-serif; overflow: hidden; user-select: none; color: #e2e8f0; }
      #toolbar {
        position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        background: #0f172a; border-bottom: 1px solid #1f2a44;
        padding: 8px 14px 10px; display: flex; flex-direction: column; gap: 8px;
        box-shadow: 0 1px 4px rgba(2, 6, 23, 0.35);
      }
      .toolbar-row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; width: 100%; }
      .toolbar-sep { flex: 1 1 auto; min-width: 8px; }
      #toolbar h1 { font-size: 16px; font-weight: 800; color: #e2e8f0; }
      .tabset { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
      .tabset button,
      .pill {
        border: 1px solid #2a3a5c; background: #0b1220; color: #cbd5e1;
        padding: 6px 12px; border-radius: 999px; font-size: 12px; cursor: pointer;
        white-space: nowrap;
      }
      .tabset button.active, .pill.active { background: #4f46e5; color: white; border-color: #4338ca; }
      .pill.ghost { background: #0f172a; }
      .db-badge {
        display: inline-block;
        margin-left: 6px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        line-height: 1.1;
        border: 1px solid #2a3a5c;
        background: #0b1220;
        color: #94a3b8;
        vertical-align: middle;
      }
      .db-badge.db2 { border-color: #22c55e55; color: #166534; }
      .db-badge.oracle { border-color: #f59e0b55; color: #92400e; }
      #airsoft-parts { display: none; width: 100%; padding-top: 6px; border-top: 1px solid #1f2a44; }
      #airsoft-parts .airsoft-filter-label { color: #94a3b8; font-size: 11px; font-weight: 700; margin-right: 8px; align-self: center; }
      #airsoft-parts .tabset { gap: 5px; flex: 1; flex-wrap: wrap; }
      #airsoft-parts .pill { font-size: 12px; padding: 6px 12px; min-width: 2.5rem; }
      #airsoft-parts .pill.filter-todo { font-weight: 600; }
      #search {
        margin-left: 8px; width: 220px; border: 1px solid #cbd5e1;
        border-radius: 8px; padding: 6px 10px; font-size: 12px; outline: none;
        background: #0b1220; color: #e2e8f0; border-color: #2a3a5c;
      }
      #search:focus { border-color: #6366f1; }
      .toolbar-btn {
        border: 1px solid #2a3a5c; background: #0b1220; color: #cbd5e1;
        border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer;
      }
      #stats { color: #94a3b8; font-size: 12px; margin-left: 6px; }
      #hint { color: #64748b; font-size: 11px; margin-left: auto; }
      #canvas { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
      svg { width: 100%; height: 100%; }
      .table-box { cursor: grab; }
      .table-box:active { cursor: grabbing; }
      .table-title { font-size: 16px; font-weight: 700; fill: #fff; font-family: "Segoe UI", system-ui, sans-serif; }
      .table-meta { font-size: 12px; fill: rgba(255, 255, 255, 0.8); text-anchor: end; font-family: "Segoe UI", system-ui, sans-serif; }
      .col-name { font-size: 14px; font-family: "Segoe UI", system-ui, sans-serif; }
      .col-type { font-size: 11.5px; fill: #94a3b8; text-anchor: end; font-family: "Segoe UI", system-ui, sans-serif; }
      #table-tooltip {
        position: fixed; z-index: 220; max-width: 400px; pointer-events: none;
        background: #0f172a; color: #f8fafc; border: 1px solid #334155; border-radius: 8px;
        padding: 10px 12px; font-size: 12px; line-height: 1.45;
        box-shadow: 0 8px 24px rgba(2, 6, 23, 0.35);
        opacity: 0; visibility: hidden; transition: opacity 0.12s ease-in-out;
      }
      #table-tooltip.visible { opacity: 1; visibility: visible; }
      #table-tooltip strong { color: #93c5fd; display: block; margin-bottom: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
      #table-tooltip .meta-badge {
        display: inline-block; margin-top: 8px; padding: 2px 8px;
        border: 1px solid #334155; border-radius: 999px;
        color: #93c5fd; font-size: 10px; letter-spacing: 0.02em;
      }
      #table-tooltip .meta-badge.comment { color: #fbbf24; border-color: #fbbf2433; }
      #table-tooltip .meta-badge.ai { color: #a7f3d0; border-color: #a7f3d033; }
      #error {
        position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
        background: #0f172ae0; color: #fff; padding: 20px; text-align: center; z-index: 200;
      }

      /* Selection + focus */
      .table-box.faded { opacity: 0.22; }
      .table-box.neighbor { opacity: 0.9; }
      .table-box.selected { opacity: 1; }

      /* Right-side details panel */
      #details-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 340px;
        padding: 12px 12px 14px;
        background: #0b1220f5;
        border-left: 1px solid #1f2a44;
        z-index: 120;
        display: none;
        overflow: auto;
        backdrop-filter: blur(6px);
      }
      #details-panel.visible { display: block; }
      #details-title { font-size: 14px; font-weight: 800; color: #e2e8f0; margin-bottom: 6px; word-break: break-word; }
      #details-meta { color: #94a3b8; font-size: 12px; margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
      .details-chip { border: 1px solid #2a3a5c; background: #0f172a; padding: 4px 8px; border-radius: 999px; font-size: 11px; color: #cbd5e1; }
      #details-desc { color: #e2e8f0; font-size: 12px; line-height: 1.45; white-space: pre-wrap; }
      #details-close {
        position: sticky;
        top: 0;
        float: right;
        margin-left: 10px;
        border: 1px solid #2a3a5c;
        background: #0f172a;
        color: #cbd5e1;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 12px;
      }

      /* Minimap */
      #minimap {
        position: fixed;
        right: 12px;
        bottom: 12px;
        width: 220px;
        height: 150px;
        border: 1px solid #1f2a44;
        background: #0b1220cc;
        border-radius: 10px;
        z-index: 110;
        overflow: hidden;
        display: none;
        backdrop-filter: blur(6px);
      }
      #minimap.visible { display: block; }
      #minimap svg { width: 100%; height: 100%; }
      #minimap .vp { fill: none; stroke: #93c5fd; stroke-width: 1.2; opacity: 0.95; }
      #minimap .dot { fill: #94a3b8; opacity: 0.75; }
      #minimap .dot.sel { fill: #a7f3d0; opacity: 1; }

      /* Cluster boxes */
      .cluster-box { fill: #0f172a; stroke: #1f2a44; stroke-width: 1.4; opacity: 0.95; }
      .cluster-label { fill: #cbd5e1; font-size: 12px; font-weight: 800; letter-spacing: 0.02em; }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <div class="toolbar-row">
        <h1>ERD</h1>
        <div class="tabset" id="source-tabs"></div>
        <div class="toolbar-sep"></div>
        <input id="search" type="text" placeholder="Buscar tabla..." />
        <button id="btn-fit" class="toolbar-btn" type="button">Fit</button>
        <span id="stats"></span>
        <span id="hint">Scroll zoom · Pan fondo / tablas</span>
      </div>
      <div id="airsoft-parts" aria-label="Filtro de módulos Airsoft">
        <div class="toolbar-row" style="align-items: center;">
          <span class="airsoft-filter-label">Módulo</span>
          <div class="tabset" id="airsoft-tabs"></div>
        </div>
      </div>
    </div>

    <div id="canvas">
      <svg id="svg" aria-label="ERD">
        <defs>
          <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#6366f1" opacity="0.8"></path>
          </marker>
          <filter id="shadow">
            <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000025"></feDropShadow>
          </filter>
        </defs>
        <g id="viewport">
          <g id="clusters"></g>
          <g id="edges"></g>
          <g id="tables"></g>
        </g>
      </svg>
    </div>
    <div id="table-tooltip" role="tooltip">
      <strong></strong>
      <span id="table-tooltip-text"></span>
      <span id="table-tooltip-badge" class="meta-badge">Descripción</span>
    </div>
    <div id="details-panel" aria-label="Detalles de tabla">
      <button id="details-close" type="button">Cerrar</button>
      <div id="details-title"></div>
      <div id="details-meta"></div>
      <div id="details-desc"></div>
    </div>
    <div id="minimap" aria-label="Minimapa">
      <svg id="minimap-svg" viewBox="0 0 220 150" preserveAspectRatio="none">
        <rect x="0" y="0" width="220" height="150" fill="transparent"></rect>
        <g id="minimap-dots"></g>
        <rect id="minimap-vp" class="vp" x="0" y="0" width="10" height="10"></rect>
      </svg>
    </div>
    <div id="error"></div>

    <script>
      /** Ruta al manifest, siempre relativa a esta pagina (evita rutas rotas con redirects). */
      function getManifestUrl(cacheBust) {
        const u = new URL("data/datasets.manifest.json", window.location.href);
        if (cacheBust) u.searchParams.set("t", String(Date.now()));
        else u.searchParams.set("v", "2");
        return u.toString();
      }

      function isManifestV2(raw) {
        if (!raw || typeof raw !== "object" || Array.isArray(raw)) return false;
        const ver = Number(raw.version);
        return ver === 2 && Array.isArray(raw.topLevel);
      }

      const svg = document.getElementById("svg");
      const viewport = document.getElementById("viewport");
      const clustersG = document.getElementById("clusters");
      const edgesG = document.getElementById("edges");
      const tablesG = document.getElementById("tables");
      const canvasEl = document.getElementById("canvas");
      const toolbar = document.getElementById("toolbar");
      const statsEl = document.getElementById("stats");
      const errorEl = document.getElementById("error");
      const searchEl = document.getElementById("search");
      const tooltipEl = document.getElementById("table-tooltip");
      const tooltipTitleEl = tooltipEl.querySelector("strong");
      const tooltipTextEl = document.getElementById("table-tooltip-text");
      const tooltipBadgeEl = document.getElementById("table-tooltip-badge");
      const detailsPanelEl = document.getElementById("details-panel");
      const detailsTitleEl = document.getElementById("details-title");
      const detailsMetaEl = document.getElementById("details-meta");
      const detailsDescEl = document.getElementById("details-desc");
      const detailsCloseEl = document.getElementById("details-close");
      const minimapEl = document.getElementById("minimap");
      const minimapDotsEl = document.getElementById("minimap-dots");
      const minimapVpEl = document.getElementById("minimap-vp");
      const airsoftRow = document.getElementById("airsoft-parts");
      const airsoftTabs = document.getElementById("airsoft-tabs");
      const AIRSOFT_ROOT_ID = "airsoft_full";

      const COL_W = 480;
      const HDR_H = 50;
      const ROW_H = 32;
      const WRAP_X = 8500;

      const pz = { x: 0, y: 0, scale: 1 };
      let datasets = [];
      let airsoftGroup = null;
      let lastAirsoftChoice = null;
      let activeDataset = null;
      let schema = null;
      let visibleTables = [];
      let visibleRefs = [];
      let positions = {};
      let tableHeights = {};
      let selectedTable = null;
      let neighborTables = new Set();
      let refsByTable = {};
      let bounds = null;
      let clusterLayouts = [];

      function syncCanvasTop() {
        if (!canvasEl || !toolbar) return;
        canvasEl.style.top = `${toolbar.offsetHeight}px`;
      }

      window.addEventListener("resize", () => {
        syncCanvasTop();
      });

      function showError(msg) {
        errorEl.style.display = "flex";
        errorEl.textContent = msg;
      }

      function moveTooltip(clientX, clientY) {
        const pad = 14;
        let x = clientX + pad;
        let y = clientY + pad;
        const rect = tooltipEl.getBoundingClientRect();
        if (x + rect.width > window.innerWidth - 8) x = clientX - rect.width - pad;
        if (y + rect.height > window.innerHeight - 8) y = clientY - rect.height - pad;
        tooltipEl.style.left = `${x}px`;
        tooltipEl.style.top = `${y}px`;
      }

      function showTooltip(tableName, text, badgeText, badgeKind, clientX, clientY) {
        tooltipTitleEl.textContent = tableName;
        tooltipTextEl.textContent = text;
        if (tooltipBadgeEl) {
          tooltipBadgeEl.textContent = badgeText || "";
          tooltipBadgeEl.classList.remove("comment", "ai");
          if (badgeKind) tooltipBadgeEl.classList.add(badgeKind);
        }
        tooltipEl.classList.add("visible");
        moveTooltip(clientX, clientY);
      }

      function hideTooltip() {
        tooltipEl.classList.remove("visible");
      }

      function applyTransform() {
        viewport.setAttribute("transform", `translate(${pz.x},${pz.y}) scale(${pz.scale})`);
        updateMinimapViewport();
      }

      function clearSelection() {
        selectedTable = null;
        neighborTables = new Set();
        if (detailsPanelEl) detailsPanelEl.classList.remove("visible");
        rerender();
      }

      if (detailsCloseEl) {
        detailsCloseEl.addEventListener("click", clearSelection);
      }

      function setSelection(tableName) {
        selectedTable = tableName;
        neighborTables = new Set();
        if (tableName && refsByTable[tableName]) {
          refsByTable[tableName].forEach((r) => {
            neighborTables.add(r.from_table);
            neighborTables.add(r.to_table);
          });
        }
        updateDetailsPanel();
        rerender();
      }

      function updateDetailsPanel() {
        if (!detailsPanelEl) return;
        if (!selectedTable) {
          detailsPanelEl.classList.remove("visible");
          return;
        }
        detailsPanelEl.classList.add("visible");
        if (detailsTitleEl) detailsTitleEl.textContent = selectedTable;
        const cols = (schema && schema.columns && schema.columns[selectedTable]) ? schema.columns[selectedTable] : [];
        const rels = refsByTable[selectedTable] ? refsByTable[selectedTable].length : 0;
        const desc = (schema && schema.ai_table_explanations && schema.ai_table_explanations[selectedTable]) || "";
        if (detailsMetaEl) {
          detailsMetaEl.innerHTML = "";
          const mk = (txt) => {
            const s = document.createElement("span");
            s.className = "details-chip";
            s.textContent = txt;
            return s;
          };
          detailsMetaEl.appendChild(mk(`${cols.length} columnas`));
          detailsMetaEl.appendChild(mk(`${rels} relaciones directas`));
        }
        if (detailsDescEl) {
          detailsDescEl.textContent = desc || "Sin descripción.";
        }
      }

      function updateMinimap() {
        if (!minimapEl || !minimapDotsEl || !minimapVpEl) return;
        if (!bounds || !Object.keys(positions).length) {
          minimapEl.classList.remove("visible");
          return;
        }
        minimapEl.classList.add("visible");
        minimapDotsEl.innerHTML = "";
        const W = 220;
        const H = 150;
        const b = bounds;
        const sx = (W - 14) / Math.max(1, b.maxX - b.minX);
        const sy = (H - 14) / Math.max(1, b.maxY - b.minY);
        const s = Math.min(sx, sy);
        const ox = 7 - b.minX * s;
        const oy = 7 - b.minY * s;

        Object.entries(positions).forEach(([t, p]) => {
          const cx = ox + p.x * s;
          const cy = oy + p.y * s;
          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("cx", String(cx));
          dot.setAttribute("cy", String(cy));
          dot.setAttribute("r", t === selectedTable ? "2.6" : "1.6");
          dot.setAttribute("class", t === selectedTable ? "dot sel" : "dot");
          minimapDotsEl.appendChild(dot);
        });
        updateMinimapViewport();
      }

      function updateMinimapViewport() {
        if (!minimapEl || !minimapVpEl || !bounds) return;
        if (!minimapEl.classList.contains("visible")) return;
        const W = 220;
        const H = 150;
        const b = bounds;
        const sx = (W - 14) / Math.max(1, b.maxX - b.minX);
        const sy = (H - 14) / Math.max(1, b.maxY - b.minY);
        const s = Math.min(sx, sy);
        const ox = 7 - b.minX * s;
        const oy = 7 - b.minY * s;

        // Screen viewport -> world bounds
        const rect = svg.getBoundingClientRect();
        const vw = rect.width;
        const vh = rect.height;
        const wMinX = (0 - pz.x) / pz.scale;
        const wMinY = (0 - pz.y) / pz.scale;
        const wMaxX = (vw - pz.x) / pz.scale;
        const wMaxY = (vh - pz.y) / pz.scale;

        const x = ox + wMinX * s;
        const y = oy + wMinY * s;
        const w = (wMaxX - wMinX) * s;
        const h = (wMaxY - wMinY) * s;
        minimapVpEl.setAttribute("x", String(x));
        minimapVpEl.setAttribute("y", String(y));
        minimapVpEl.setAttribute("width", String(Math.max(8, w)));
        minimapVpEl.setAttribute("height", String(Math.max(8, h)));
      }

      function getTableColor(tableName) {
        const owner = tableName.includes(".") ? tableName.split(".")[0] : tableName.split("_")[0];
        const palette = {
          RAT: "#4f46e5",
          CAP: "#9333ea",
          CERT: "#0e7490",
          EMP: "#059669",
          PLA: "#d97706",
          TML: "#4f46e5",
          MDM: "#0f766e",
        };
        return palette[owner] || "#475569";
      }

      function getColY(tableName, colName) {
        const cols = schema.columns[tableName] || [];
        const idx = cols.findIndex((c) => c.name === colName);
        return idx >= 0 ? HDR_H + idx * ROW_H + ROW_H / 2 + 4 : HDR_H / 2;
      }

      function buildVisibleData() {
        const q = searchEl.value.trim().toLowerCase();
        visibleTables = schema.tables.filter((t) => !q || t.toLowerCase().includes(q));
        const keep = new Set(visibleTables);
        visibleRefs = (schema.refs || []).filter((r) => keep.has(r.from_table) && keep.has(r.to_table));
      }

      function computeLayout() {
        tableHeights = {};
        visibleTables.forEach((t) => {
          const cols = schema.columns[t] || [];
          tableHeights[t] = HDR_H + cols.length * ROW_H + 10;
        });

        const adj = {};
        visibleTables.forEach((t) => {
          adj[t] = new Set();
        });
        visibleRefs.forEach((r) => {
          if (adj[r.from_table] && adj[r.to_table]) {
            adj[r.from_table].add(r.to_table);
            adj[r.to_table].add(r.from_table);
          }
        });

        const visited = new Set();
        const components = [];
        visibleTables.forEach((t) => {
          if (visited.has(t)) return;
          const comp = [];
          const q = [t];
          visited.add(t);
          while (q.length) {
            const n = q.shift();
            comp.push(n);
            adj[n].forEach((nb) => {
              if (!visited.has(nb)) {
                visited.add(nb);
                q.push(nb);
              }
            });
          }
          components.push(comp);
        });

        // Grouped grid layout (no radial/circle): clusters by schema/prefix + "Other / Low connectivity".
        const groupKey = (t) => {
          if (t.includes(".")) return t.split(".", 1)[0].toUpperCase();
          return t.split("_", 1)[0].toUpperCase();
        };

        const degree = {};
        visibleTables.forEach((t) => {
          degree[t] = refsByTable[t] ? refsByTable[t].length : 0;
        });

        const LOW_DEGREE_MAX = 1;
        const OTHER_KEY = "Other / Low connectivity";

        const groups = {};
        visibleTables.forEach((t) => {
          const base = groupKey(t);
          const k = degree[t] <= LOW_DEGREE_MAX ? OTHER_KEY : base;
          (groups[k] ||= []).push(t);
        });

        const gKeys = Object.keys(groups).sort((a, b) => {
          if (a === OTHER_KEY) return 1;
          if (b === OTHER_KEY) return -1;
          const da = groups[a].length;
          const db = groups[b].length;
          if (db !== da) return db - da;
          return a.localeCompare(b);
        });

        const vw = Math.max(900, svg.clientWidth || 1200);
        const baseCols = Math.floor(vw / (COL_W + 140));
        const CLUSTER_COLS = Math.max(4, Math.min(8, baseCols));

        // Cluster placement (dashboard-like)
        positions = {};
        clusterLayouts = [];
        const START_X = 90;
        const START_Y = 110;
        const CLUSTER_PAD_X = 34;
        const CLUSTER_PAD_Y = 44; // includes label space
        const CLUSTER_GAP_X = 220;
        const CLUSTER_GAP_Y = 260;
        const MAX_ROW_W = 5600;

        let curX = START_X;
        let curY = START_Y;
        let maxRowH = 0;

        const orderWithinGroup = (tables) => {
          // Keep related/connected close: start from highest-degree and BFS locally.
          const set = new Set(tables);
          const localAdj = {};
          tables.forEach((t) => (localAdj[t] = new Set()));
          visibleRefs.forEach((r) => {
            if (set.has(r.from_table) && set.has(r.to_table)) {
              localAdj[r.from_table].add(r.to_table);
              localAdj[r.to_table].add(r.from_table);
            }
          });

          const remaining = new Set(tables);
          const out = [];
          const pickSeed = () => {
            let best = null;
            remaining.forEach((t) => {
              if (!best) best = t;
              else if (degree[t] > degree[best]) best = t;
              else if (degree[t] === degree[best] && t < best) best = t;
            });
            return best;
          };

          while (remaining.size) {
            const seed = pickSeed();
            if (!seed) break;
            const q = [seed];
            remaining.delete(seed);
            while (q.length) {
              const cur = q.shift();
              out.push(cur);
              Array.from(localAdj[cur]).sort().forEach((nb) => {
                if (remaining.has(nb)) {
                  remaining.delete(nb);
                  q.push(nb);
                }
              });
            }
          }
          return out;
        };

        gKeys.forEach((k) => {
          const rawTables = groups[k].slice();
          const tables = orderWithinGroup(rawTables);
          const n = tables.length;
          const cols = Math.min(CLUSTER_COLS, Math.max(4, Math.ceil(Math.sqrt(n))));
          const rows = Math.ceil(n / cols);
          const cellW = COL_W + 110;

          const rowHeights = new Array(rows).fill(0);
          for (let i = 0; i < n; i += 1) {
            const r = Math.floor(i / cols);
            rowHeights[r] = Math.max(rowHeights[r], tableHeights[tables[i]] || (HDR_H + 140));
          }

          const innerW = cols * cellW;
          const innerH = rowHeights.reduce((a, b) => a + b, 0) + (rows - 1) * 70;
          const clusterW = innerW + CLUSTER_PAD_X * 2;
          const clusterH = innerH + CLUSTER_PAD_Y + 26;

          if (curX + clusterW > START_X + MAX_ROW_W && curX !== START_X) {
            curX = START_X;
            curY += maxRowH + CLUSTER_GAP_Y;
            maxRowH = 0;
          }

          // record cluster box (for labels + background)
          clusterLayouts.push({
            key: k,
            x: curX,
            y: curY - 56,
            w: clusterW,
            h: clusterH + 56,
          });

          let yy = curY;
          for (let r = 0; r < rows; r += 1) {
            for (let c = 0; c < cols; c += 1) {
              const idx = r * cols + c;
              if (idx >= n) break;
              const t = tables[idx];
              positions[t] = {
                x: curX + CLUSTER_PAD_X + c * cellW,
                y: yy,
              };
            }
            yy += rowHeights[r] + 70;
          }

          curX += clusterW + CLUSTER_GAP_X;
          maxRowH = Math.max(maxRowH, clusterH + 56);
        });

        const vals = Object.values(positions);
        if (vals.length) {
          const minX = Math.min(...vals.map((p) => p.x));
          const minY = Math.min(...vals.map((p) => p.y));
          const maxX = Math.max(...vals.map((p) => p.x)) + COL_W;
          const maxY = Math.max(...vals.map((p) => p.y)) + 260;
          bounds = { minX, minY, maxX, maxY };
        } else {
          bounds = null;
        }
      }

      function mkSVG(tag, attrs) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
        Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
        return el;
      }

      function renderClusters() {
        if (!clustersG) return;
        clustersG.innerHTML = "";
        (clusterLayouts || []).forEach((cl) => {
          clustersG.appendChild(
            mkSVG("rect", {
              x: cl.x,
              y: cl.y,
              width: cl.w,
              height: cl.h,
              rx: 14,
              class: "cluster-box",
            })
          );
          const label = mkSVG("text", { x: cl.x + 14, y: cl.y + 26, class: "cluster-label" });
          label.textContent = cl.key;
          clustersG.appendChild(label);
        });
      }

      function clientToWorld(clientX, clientY) {
        const rect = svg.getBoundingClientRect();
        const sx = clientX - rect.left;
        const sy = clientY - rect.top;
        return { x: (sx - pz.x) / pz.scale, y: (sy - pz.y) / pz.scale };
      }

      function renderEdges() {
        edgesG.innerHTML = "";
        visibleRefs.forEach((r) => {
          const fp = positions[r.from_table];
          const tp = positions[r.to_table];
          if (!fp || !tp) return;
          const fy = fp.y + getColY(r.from_table, r.from_col);
          const ty = tp.y + getColY(r.to_table, r.to_col);
          let fx;
          let tx;
          let cp1;
          let cp2;

          if (fp.x > tp.x + COL_W) {
            fx = fp.x;
            tx = tp.x + COL_W;
            cp1 = fx - 90;
            cp2 = tx + 90;
          } else if (tp.x > fp.x + COL_W) {
            fx = fp.x + COL_W;
            tx = tp.x;
            cp1 = fx + 90;
            cp2 = tx - 90;
          } else {
            fx = fp.x;
            tx = tp.x;
            cp1 = fx - 120;
            cp2 = tx - 120;
          }

          const d = `M${fx},${fy} C${cp1},${fy} ${cp2},${ty} ${tx},${ty}`;
          const isFocus = selectedTable && (r.from_table === selectedTable || r.to_table === selectedTable);
          const isRelated = selectedTable && (neighborTables.has(r.from_table) && neighborTables.has(r.to_table));
          const dim = selectedTable && !isRelated;
          edgesG.appendChild(
            mkSVG("path", {
              d,
              fill: "none",
              stroke: isFocus ? "#a7f3d0" : "#6366f1",
              "stroke-width": isFocus ? 2.6 : 2,
              "stroke-opacity": dim ? 0.08 : 0.55,
              "marker-end": "url(#arrow)",
            })
          );
        });
      }

      let _dragWired = false;
      let _dragState = null; // { table, dx, dy }

      function renderTables() {
        tablesG.innerHTML = "";
        const tableEls = {};
        visibleTables.forEach((t) => {
          const cols = schema.columns[t] || [];
          const pks = new Set(schema.pks[t] || []);
          const uqs = new Set(schema.uqs ? schema.uqs[t] || [] : []);
          const fkMap = {};
          (schema.refs || []).forEach((r) => {
            if (r.from_table === t) fkMap[r.from_col] = true;
          });
          const pos = positions[t];
          const h = tableHeights[t];
          const clr = getTableColor(t);
          const hasComment = Boolean(schema.table_comments && schema.table_comments[t]);
          const tableExplanation =
            (schema.ai_table_explanations && schema.ai_table_explanations[t]) ||
            (schema.table_comments && schema.table_comments[t]) ||
            "Descripción no disponible.";
          const badgeText = hasComment ? "Basado en comentarios del catálogo" : "Generado por IA";
          const badgeKind = hasComment ? "comment" : "ai";

          const g = mkSVG("g", { class: "table-box", transform: `translate(${pos.x},${pos.y})`, "data-table": t });
          g.addEventListener("click", (evt) => {
            evt.stopPropagation();
            setSelection(t);
          });
          g.appendChild(mkSVG("rect", { x: 0, y: 0, width: COL_W, height: h, rx: 12, fill: "#0b1220", filter: "url(#shadow)", stroke: clr, "stroke-width": 2.2, "stroke-opacity": 0.55 }));
          g.appendChild(mkSVG("rect", { x: 0, y: 0, width: COL_W, height: HDR_H, rx: 10, fill: clr }));
          g.appendChild(mkSVG("rect", { x: 0, y: HDR_H - 10, width: COL_W, height: 10, fill: clr }));

          const title = mkSVG("text", { x: 14, y: 33, class: "table-title" });
          title.textContent = t;
          g.appendChild(title);

          const cnt = mkSVG("text", { x: COL_W - 12, y: 33, class: "table-meta" });
          cnt.textContent = `${cols.length} cols`;
          g.appendChild(cnt);

          const hoverHit = mkSVG("rect", { x: 0, y: 0, width: COL_W, height: HDR_H, rx: 10, fill: "transparent", stroke: "none" });
          hoverHit.addEventListener("mouseenter", (evt) => showTooltip(t, tableExplanation, badgeText, badgeKind, evt.clientX, evt.clientY));
          hoverHit.addEventListener("mousemove", (evt) => {
            if (tooltipEl.classList.contains("visible")) moveTooltip(evt.clientX, evt.clientY);
          });
          hoverHit.addEventListener("mouseleave", hideTooltip);
          g.appendChild(hoverHit);

          cols.forEach((col, i) => {
            const y = HDR_H + i * ROW_H + 5;
            const isPK = pks.has(col.name);
            const isFK = fkMap[col.name];
            const isUQ = uqs.has(col.name) && !isPK;
            const fill = isPK ? "#2a2206" : isFK ? "#0b1b3d" : isUQ ? "#052413" : "transparent";
            g.appendChild(mkSVG("rect", { x: 2, y: y - 1, width: COL_W - 4, height: ROW_H - 2, rx: 4, fill }));

            const colName = mkSVG("text", { x: 14, y: y + 18, class: "col-name", fill: isPK ? "#fbbf24" : isFK ? "#a5b4fc" : isUQ ? "#86efac" : "#e2e8f0" });
            colName.textContent = col.name;
            g.appendChild(colName);

            const colType = mkSVG("text", { x: COL_W - 10, y: y + 18, class: "col-type" });
            colType.textContent = col.type;
            g.appendChild(colType);
          });

          g.appendChild(mkSVG("rect", { x: 0, y: 0, width: COL_W, height: h, rx: 10, fill: "none", stroke: clr, "stroke-width": 1.1, "stroke-opacity": 0.45 }));
          // Selection fade
          if (selectedTable) {
            if (t === selectedTable) g.classList.add("selected");
            else if (neighborTables.has(t)) g.classList.add("neighbor");
            else g.classList.add("faded");
          }
          tablesG.appendChild(g);
          tableEls[t] = g;
        });

        // Wire drag once (listeners persist); update live map each render.
        if (!_dragWired) {
          _dragWired = true;
          window.addEventListener("mousemove", (evt) => {
            if (!_dragState) return;
            const wp = clientToWorld(evt.clientX, evt.clientY);
            const nx = Math.round(wp.x - _dragState.dx);
            const ny = Math.round(wp.y - _dragState.dy);
            positions[_dragState.table] = { x: nx, y: ny };
            // Table element might be recreated on rerender; query current one.
            const el = document.querySelector(`.table-box[data-table="${_dragState.table}"]`);
            if (el) el.setAttribute("transform", `translate(${nx},${ny})`);
            renderEdges();
          });
          window.addEventListener("mouseup", () => {
            _dragState = null;
          });
        }

        tablesG.querySelectorAll(".table-box").forEach((node) => {
          node.addEventListener("mousedown", (evt) => {
            evt.preventDefault();
            evt.stopPropagation();
            const table = node.getAttribute("data-table");
            if (!table) return;
            const wp = clientToWorld(evt.clientX, evt.clientY);
            const cur = positions[table];
            if (!cur) return;
            _dragState = { table, dx: wp.x - cur.x, dy: wp.y - cur.y };
            hideTooltip();
          });
        });
      }

      function fitAll() {
        const vals = Object.values(positions);
        if (!vals.length) return;
        const minX = Math.min(...vals.map((p) => p.x));
        const minY = Math.min(...vals.map((p) => p.y));
        const maxX = Math.max(...vals.map((p) => p.x)) + COL_W;
        const maxY = Math.max(...vals.map((p) => p.y + 220));
        const vw = svg.clientWidth;
        const vh = svg.clientHeight;
        const sx = vw / (maxX - minX + 220);
        const sy = vh / (maxY - minY + 180);
        pz.scale = Math.min(sx, sy, 2.8) * 0.95;
        // Align to the right (so the diagram sits on the right side),
        // while keeping a small padding. This matches "todo al lado derecho".
        const pad = 28;
        pz.x = vw - (maxX - minX) * pz.scale - pad - minX * pz.scale;
        // Keep vertically centered (can be changed to top-align if needed).
        pz.y = (vh - (maxY - minY) * pz.scale) / 2 - minY * pz.scale;
        applyTransform();
      }

      function activeDatasetLabel() {
        const hit = datasets.find((d) => d.id === activeDataset);
        return hit ? hit.label : activeDataset;
      }

      function activeDatasetSource() {
        const hit = datasets.find((d) => d.id === activeDataset);
        return hit ? hit.source : null;
      }

      function updateStats() {
        const nCols = visibleTables.reduce((acc, t) => acc + (schema.columns[t] || []).length, 0);
        const src = activeDatasetSource();
        const srcTxt = src ? ` · ${src.toUpperCase()}` : "";
        statsEl.textContent = `${activeDatasetLabel()}${srcTxt} · ${visibleTables.length} tablas · ${nCols} columnas · ${visibleRefs.length} relaciones`;
      }

      function isAirsoftDatasetId(key) {
        if (!key) return false;
        if (key === AIRSOFT_ROOT_ID) return true;
        if (!airsoftGroup) return false;
        return (airsoftGroup.children || []).some((c) => c.id === key);
      }

      function setAirsoftRowVisible(visible) {
        if (!airsoftRow) return;
        airsoftRow.style.display = visible ? "block" : "none";
        syncCanvasTop();
      }

      function setTopTabHighlight(datasetKey) {
        const isAirsoft = isAirsoftDatasetId(datasetKey);
        const tabRats = document.getElementById("tab-rats");
        const tabTml = document.getElementById("tab-tml");
        const tabAir = document.getElementById("tab-airsoft");
        if (tabRats) {
          tabRats.classList.toggle("active", datasetKey === "rats" && !isAirsoft);
        }
        if (tabTml) {
          tabTml.classList.toggle("active", datasetKey === "tml" && !isAirsoft);
        }
        if (tabAir) {
          tabAir.classList.toggle("active", isAirsoft);
        }
      }

      function setAirsoftSubHighlight(datasetKey) {
        if (!airsoftTabs) return;
        airsoftTabs.querySelectorAll("button").forEach((b) => {
          b.classList.toggle("active", b.dataset.src === datasetKey);
        });
      }

      function rerender() {
        hideTooltip();
        buildVisibleData();
        computeLayout();
        renderClusters();
        renderTables();
        renderEdges();
        fitAll();
        updateStats();
        updateMinimap();
      }

      async function loadDataset(key) {
        activeDataset = key;
        const dataset = datasets.find((d) => d.id === key);
        if (!dataset) {
          throw new Error(`Dataset no encontrado: ${key}`);
        }
        setTopTabHighlight(key);
        const air = isAirsoftDatasetId(key);
        setAirsoftRowVisible(air);
        if (air) {
          lastAirsoftChoice = key;
          setAirsoftSubHighlight(key);
        } else {
          setAirsoftSubHighlight("");
        }

        const res = await fetch(`./data/${dataset.file}`, { cache: "no-store" });
        if (!res.ok) {
          throw new Error(`No se pudo cargar ${dataset.file} (${res.status})`);
        }
        schema = await res.json();
        rerender();
      }

      searchEl.addEventListener("input", () => rerender());
      document.getElementById("btn-fit").addEventListener("click", fitAll);

      function modulePillText(label) {
        return (label || "").trim() || "?";
      }

      function buildFilterPill({ id, label, isTodo }) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = isTodo ? "pill filter-todo" : "pill ghost";
        btn.setAttribute("data-layer", "airsoft");
        btn.dataset.src = id;
        btn.textContent = isTodo ? "Todo" : modulePillText(label);
        if (!isTodo && label) btn.title = label;
        return btn;
      }

      function initDatasetsV2(manifest) {
        const top = Array.isArray(manifest.topLevel) ? manifest.topLevel : [];
        const flat = [];
        const tabs = document.getElementById("source-tabs");
        tabs.innerHTML = "";
        airsoftTabs.innerHTML = "";
        airsoftGroup = null;

        const setButtonTextWithSource = (btn, text, source) => {
          btn.textContent = text;
          const src = (source || "").toLowerCase();
          if (src === "db2" || src === "oracle") {
            const badge = document.createElement("span");
            badge.className = `db-badge ${src === "db2" ? "db2" : "oracle"}`;
            badge.textContent = src.toUpperCase();
            btn.appendChild(badge);
          }
        };

        for (const item of top) {
          if (item && item.id === "rats" && item.file) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.id = "tab-rats";
            btn.className = "pill";
            btn.dataset.src = item.id;
            setButtonTextWithSource(btn, item.label || "RATS", item.source);
            btn.setAttribute("data-layer", "top");
            btn.addEventListener("click", () => loadDataset(item.id).catch((err) => showError(err.message)));
            tabs.appendChild(btn);
            flat.push({ id: item.id, label: item.label || "RATS", file: item.file, source: item.source || null });
            continue;
          }
          if (item && item.id === "tml" && item.file) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.id = "tab-tml";
            btn.className = "pill";
            btn.dataset.src = item.id;
            setButtonTextWithSource(btn, item.label || "TML", item.source);
            btn.setAttribute("data-layer", "top");
            btn.addEventListener("click", () => loadDataset(item.id).catch((err) => showError(err.message)));
            tabs.appendChild(btn);
            flat.push({ id: item.id, label: item.label || "TML", file: item.file, source: item.source || null });
            continue;
          }
          if (item && (item.kind === "airsoft_root" || item.id === AIRSOFT_ROOT_ID) && item.file) {
            airsoftGroup = item;
            const btn = document.createElement("button");
            btn.type = "button";
            btn.id = "tab-airsoft";
            btn.className = "pill";
            btn.dataset.src = item.id;
            setButtonTextWithSource(btn, "Airsoft", item.source);
            btn.setAttribute("data-layer", "top");
            btn.addEventListener("click", () => loadDataset(item.id).catch((err) => showError(err.message)));
            tabs.appendChild(btn);
            flat.push({ id: item.id, label: "Airsoft · Todo", file: item.file, source: item.source || null });
            const todoPill = buildFilterPill({ id: item.id, label: item.label, isTodo: true });
            todoPill.addEventListener("click", () => loadDataset(item.id).catch((e) => showError(e.message)));
            airsoftTabs.appendChild(todoPill);
            (item.children || []).forEach((ch) => {
              if (!ch || !ch.id || !ch.file) return;
              const sub = buildFilterPill({ id: ch.id, label: ch.label, isTodo: false });
              sub.addEventListener("click", () => loadDataset(ch.id).catch((e) => showError(e.message)));
              airsoftTabs.appendChild(sub);
              flat.push({
                id: ch.id,
                label: `Airsoft · ${modulePillText(ch.label)}`,
                file: ch.file,
                source: ch.source || item.source || null,
              });
            });
            continue;
          }
        }
        if (!flat.length) {
          throw new Error("Manifest v2: no se pudo armar la navegación (topLevel vacío o inválido)");
        }
        datasets = flat;
      }

      function initDatasetsLegacy(list) {
        if (!Array.isArray(list) || !list.length) {
          throw new Error("Manifest vacío: genera data con build_erd_data_from_env.py");
        }
        airsoftGroup = null;
        const tabs = document.getElementById("source-tabs");
        tabs.innerHTML = "";
        if (airsoftTabs) airsoftTabs.innerHTML = "";
        if (airsoftRow) airsoftRow.style.display = "none";
        list.forEach((d, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "pill";
          if (d.id === "rats") btn.id = "tab-rats";
          if (d.id === "tml") btn.id = "tab-tml";
          if (d.id === AIRSOFT_ROOT_ID) btn.id = "tab-airsoft";
          btn.dataset.src = d.id;
          btn.textContent = d.label;
          btn.setAttribute("data-layer", "top");
          if (idx === 0) btn.classList.add("active");
          btn.addEventListener("click", () => loadDataset(d.id).catch((err) => showError(err.message)));
          tabs.appendChild(btn);
        });
        datasets = list;
      }

      async function initDatasets() {
        const tryLoad = async (bust) => {
          const url = getManifestUrl(bust);
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) {
            throw new Error(
              `No se pudo cargar el manifest (${res.status}). ` +
                `Abre el ERD con la URL que termina en /erd/index.html y recarga con Cmd+Shift+R.`
            );
          }
          return res.json();
        };

        let raw = await tryLoad(false);
        if (Array.isArray(raw) && raw.length === 0) {
          raw = await tryLoad(true);
        }

        if (isManifestV2(raw)) {
          initDatasetsV2(raw);
        } else if (Array.isArray(raw)) {
          if (raw.length === 0) {
            throw new Error(
              "El manifest llegó vacío ([]). Suele ser caché del navegador: recarga forzada (Cmd+Shift+R) " +
                "o abre en ventana privada. No hace falta acceso a Oracle para ver el ERD: los JSON ya van en el repo."
            );
          }
          initDatasetsLegacy(raw);
        } else {
          throw new Error(
            "Formato de datasets.manifest.json desconocido. Sube `erd/data/datasets.manifest.json` (v2) " +
              "o ejecuta en local: python3 erd/build_erd_data_from_env.py --from-existing"
          );
        }
        setAirsoftRowVisible(false);
        syncCanvasTop();
        const boot =
          (lastAirsoftChoice && datasets.find((d) => d.id === lastAirsoftChoice) && lastAirsoftChoice) ||
          "rats";
        await loadDataset(datasets.some((d) => d.id === boot) ? boot : datasets[0].id);
      }

      let panning = false;
      let psx = 0;
      let psy = 0;
      let pox = 0;
      let poy = 0;
      svg.addEventListener("mousedown", (evt) => {
        if (evt.target === svg || evt.target.id === "svg") {
          panning = true;
          psx = evt.clientX;
          psy = evt.clientY;
          pox = pz.x;
          poy = pz.y;
        }
      });
      // Click on empty space clears selection
      svg.addEventListener("click", (evt) => {
        if (evt.target === svg || evt.target.id === "svg") {
          clearSelection();
        }
      });
      window.addEventListener("mousemove", (evt) => {
        if (!panning) return;
        pz.x = pox + (evt.clientX - psx);
        pz.y = poy + (evt.clientY - psy);
        applyTransform();
      });
      window.addEventListener("mouseup", () => {
        panning = false;
        hideTooltip();
      });
      svg.addEventListener(
        "wheel",
        (evt) => {
          evt.preventDefault();
          const rect = svg.getBoundingClientRect();
          const mx = evt.clientX - rect.left;
          const my = evt.clientY - rect.top;

          // Animated zoom: accumulate a targetScale and ease towards it.
          // This removes the "first zoom jump" when deltaY spikes.
          if (!pz._zoom) {
            pz._zoom = { targetScale: pz.scale, raf: 0, lastMx: mx, lastMy: my };
          }
          pz._zoom.lastMx = mx;
          pz._zoom.lastMy = my;

          const oldTarget = pz._zoom.targetScale;
          // Clamp delta and use a gentler curve to avoid "too much" first zoom.
          const dy = Math.max(-60, Math.min(60, evt.deltaY));
          const factor = Math.exp(-dy * 0.0004);
          const nextTarget = Math.min(4, Math.max(0.15, oldTarget * factor));
          pz._zoom.targetScale = nextTarget;

          const start = performance.now();
          const startScale = pz.scale;
          const startX = pz.x;
          const startY = pz.y;

          const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
          const durationMs = 140;

          const step = (now) => {
            const t = Math.min(1, (now - start) / durationMs);
            const k = easeOutCubic(t);
            const desired = startScale + (pz._zoom.targetScale - startScale) * k;
            const ratio = desired / pz.scale;
            const ax = pz._zoom.lastMx;
            const ay = pz._zoom.lastMy;
            pz.x = ax - (ax - pz.x) * ratio;
            pz.y = ay - (ay - pz.y) * ratio;
            pz.scale = desired;
            applyTransform();
            if (t < 1) {
              pz._zoom.raf = requestAnimationFrame(step);
            } else {
              pz._zoom.raf = 0;
            }
          };

          if (!pz._zoom.raf) {
            // ensure we start from the current state
            pz.x = startX;
            pz.y = startY;
            pz.scale = startScale;
            pz._zoom.raf = requestAnimationFrame(step);
          }
        },
        { passive: false }
      );

      initDatasets().catch((err) => showError(err.message));
    </script>
  </body>
