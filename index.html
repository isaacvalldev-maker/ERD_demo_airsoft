      let colorMap = {};

      function buildSchemaForModule(key) {
        const m = MODULES[key];
        return {
          tables: m.tables,
          columns: m.columns,
          pks: m.pks,
          uqs: {},
          refs: m.refs,
          table_comments: m.table_comments || {}
        };
      }

      function computeLayout() {
        headerHeights = {};
        tableHeights = {};
        schema.tables.forEach(t => {
          headerHeights[t] = BASE_HDR_H;
          tableHeights[t] = BASE_HDR_H + (schema.columns[t] || []).length * ROW_H + 8;
        });
        positions = {};
        const COLS = Math.min(3, Math.max(1, schema.tables.length));
        const GAP_X = 90, GAP_Y = 64, START_X = 48, START_Y = 48;
        const rows = [];
        for (let i = 0; i < schema.tables.length; i += COLS) rows.push(schema.tables.slice(i, i + COLS));
        let curY = START_Y;
        for (const row of rows) {
          const rowMaxH = Math.max(...row.map(t => tableHeights[t]));
          row.forEach((t, colIdx) => {
            positions[t] = { x: START_X + colIdx * (COL_W + GAP_X), y: curY };
          });
          curY += rowMaxH + GAP_Y;
        }
        colorMap = {};
        schema.tables.forEach((t, i) => { colorMap[t] = COLORS[i % COLORS.length]; });
      }

      const svg = document.getElementById("svg");
      const viewport = document.getElementById("viewport");
      const edgesG = document.getElementById("edges");
      const tablesG = document.getElementById("tables");
      const tooltip = document.getElementById("tooltip");
      const tooltipBody = document.getElementById("tooltip-body");
      const tooltipTitle = tooltip.querySelector("strong");

      function showTooltip(htmlTitle, text, clientX, clientY) {
        tooltipTitle.textContent = htmlTitle;
        tooltipBody.textContent = text;
        tooltip.classList.add("visible");
        const pad = 14;
        let x = clientX + pad, y = clientY + pad;
        const rect = tooltip.getBoundingClientRect();
        if (x + rect.width > window.innerWidth - 8) x = clientX - rect.width - pad;
        if (y + rect.height > window.innerHeight - 8) y = clientY - rect.height - pad;
        tooltip.style.left = x + "px";
        tooltip.style.top = y + "px";
      }
      function hideTooltip() {
        tooltip.classList.remove("visible");
      }

      function mkSVG(tag, attrs) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
        for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
        return el;
      }

      function getColY(table, colName) {
        const cols = schema.columns[table] || [];
        const idx = cols.findIndex(c => c.name === colName);
        const hh = headerHeights[table] ?? BASE_HDR_H;
        return idx >= 0 ? hh + idx * ROW_H + ROW_H / 2 + 4 : hh / 2;
      }

      function renderEdges() {
        edgesG.innerHTML = "";
        schema.refs.forEach(ref => {
          const fromPos = positions[ref.from_table];
          const toPos = positions[ref.to_table];
          if (!fromPos || !toPos) return;

          const fy = fromPos.y + getColY(ref.from_table, ref.from_col);
          const ty = toPos.y + getColY(ref.to_table, ref.to_col);

          const fRight = fromPos.x + COL_W;
          const tRight = toPos.x + COL_W;
          let fx, tx, cp1x, cp2x;
          if (fromPos.x > toPos.x + COL_W) {
            fx = fromPos.x; tx = tRight; cp1x = fx - 60; cp2x = tx + 60;
          } else if (toPos.x > fRight) {
            fx = fRight; tx = toPos.x; cp1x = fx + 60; cp2x = tx - 60;
          } else {
            fx = fromPos.x; tx = toPos.x; cp1x = fx - 80; cp2x = tx - 80;
          }

          const path = mkSVG("path", {
            d: `M${fx},${fy} C${cp1x},${fy} ${cp2x},${ty} ${tx},${ty}`,
            fill: "none",
            stroke: "#6366f1",
            "stroke-width": 2,
            "stroke-opacity": 0.55,
            "marker-end": "url(#arrow)"
          });
          path.addEventListener("mouseenter", () => {
            path.setAttribute("stroke", "#4f46e5");
            path.setAttribute("stroke-opacity", "1");
            path.setAttribute("stroke-width", "2.5");
            path.setAttribute("marker-end", "url(#arrow-hover)");
          });
          path.addEventListener("mouseleave", () => {
            path.setAttribute("stroke", "#6366f1");
            path.setAttribute("stroke-opacity", "0.55");
            path.setAttribute("stroke-width", "2");
            path.setAttribute("marker-end", "url(#arrow)");
          });
          edgesG.appendChild(path);
        });
      }

      function renderTables() {
        tablesG.innerHTML = "";
        schema.tables.forEach(t => {
          const cols = schema.columns[t] || [];
          const pks = new Set(schema.pks?.[t] || []);
          const uqs = new Set(schema.uqs?.[t] || []);
          const fkMap = {};
          schema.refs.forEach(r => { if (r.from_table === t) fkMap[r.from_col] = r.to_table; });

          const pos = positions[t];
          const h = tableHeights[t];
          const hdrH = headerHeights[t] ?? BASE_HDR_H;
          const clr = colorMap[t] || "#475569";
          const desc = schema.table_comments?.[t] || "Sin descripción.";

          const g = mkSVG("g", {
            class: "table-box",
            transform: `translate(${pos.x},${pos.y})`,
            "data-table": t
          });

          const hit = mkSVG("rect", {
            x: 0, y: 0, width: COL_W, height: hdrH, rx: 8,
            fill: "transparent", stroke: "none", class: "table-hover-target"
          });
          hit.addEventListener("mouseenter", e => {
            showTooltip(t, desc, e.clientX, e.clientY);
          });
          hit.addEventListener("mousemove", e => {
            if (!tooltip.classList.contains("visible")) return;
            const pad = 14;
            let x = e.clientX + pad, y = e.clientY + pad;
            const rect = tooltip.getBoundingClientRect();
            if (x + rect.width > window.innerWidth - 8) x = e.clientX - rect.width - pad;
            if (y + rect.height > window.innerHeight - 8) y = e.clientY - rect.height - pad;
            tooltip.style.left = x + "px";
            tooltip.style.top = y + "px";
          });
          hit.addEventListener("mouseleave", hideTooltip);

          g.appendChild(mkSVG("rect", {
            x: 0, y: 0, width: COL_W, height: h, rx: 8,
            fill: "white", filter: "url(#shadow)", stroke: clr, "stroke-width": 1.5, "stroke-opacity": 0.35
          }));

          g.appendChild(mkSVG("rect", { x: 0, y: 0, width: COL_W, height: hdrH, rx: 8, fill: clr }));
          g.appendChild(mkSVG("rect", { x: 0, y: Math.max(0, hdrH - 10), width: COL_W, height: 10, fill: clr }));

          const title = mkSVG("text", {
            x: 14, y: 26, fill: "white", "font-size": 12, "font-weight": 600,
            "font-family": "Segoe UI,system-ui,sans-serif"
          });
          title.textContent = t;
          g.appendChild(title);

          const cnt = mkSVG("text", {
            x: COL_W - 10, y: 26, fill: "rgba(255,255,255,0.65)", "font-size": 11,
            "text-anchor": "end", "font-family": "Segoe UI,system-ui,sans-serif"
          });
          cnt.textContent = cols.length + " cols";
          g.appendChild(cnt);

          g.appendChild(mkSVG("rect", { x: 0, y: hdrH, width: COL_W, height: h - hdrH, fill: "white" }));
          g.appendChild(mkSVG("rect", { x: 0, y: h - 16, width: COL_W, height: 16, rx: 8, fill: "white" }));

          cols.forEach((col, i) => {
            const y = hdrH + i * ROW_H + 4;
            const isPK = pks.has(col.name);
            const isFK = col.name in fkMap;
            const isUQ = uqs.has(col.name) && !isPK;
            const rowFill = isPK ? "#fef3c7" : (isFK ? "#eef2ff" : (isUQ ? "#f0fdf4" : "transparent"));
            const rowBg = mkSVG("rect", { x: 1, y: y - 1, width: COL_W - 2, height: ROW_H - 2, rx: 3, fill: rowFill, class: "col-row" });
            if (col.comment) rowBg.setAttribute("title", col.comment);
            g.appendChild(rowBg);

            let badgeOffset = 0;
            if (isPK) {
              g.appendChild(mkSVG("rect", { x: 8 + badgeOffset, y: y + 5, width: 22, height: 14, rx: 3, fill: "#fde68a" }));
              const pk = mkSVG("text", { x: 19 + badgeOffset, y: y + 15, fill: "#b45309", "font-size": 9, "font-weight": 700, "text-anchor": "middle", "font-family": "Segoe UI, sans-serif" });
              pk.textContent = "PK";
              g.appendChild(pk);
              badgeOffset += 26;
            }
            if (isFK) {
              g.appendChild(mkSVG("rect", { x: 8 + badgeOffset, y: y + 5, width: 22, height: 14, rx: 3, fill: "#e0e7ff" }));
              const fk = mkSVG("text", { x: 19 + badgeOffset, y: y + 15, fill: "#4338ca", "font-size": 9, "font-weight": 700, "text-anchor": "middle", "font-family": "Segoe UI, sans-serif" });
              fk.textContent = "FK";
              g.appendChild(fk);
              badgeOffset += 26;
            }

            const nameX = badgeOffset > 0 ? (14 + badgeOffset) : 14;
            const nameColor = isPK ? "#92400e" : (isFK ? "#3730a3" : "#1e293b");
            const colName = mkSVG("text", { x: nameX, y: y + 16, fill: nameColor, "font-size": 11.5, "font-family": "Segoe UI, sans-serif" });
            colName.textContent = col.name;
            g.appendChild(colName);

            const colType = mkSVG("text", {
              x: COL_W - 10, y: y + 16, fill: "#94a3b8", "font-size": 10.5,
              "text-anchor": "end", "font-family": "Segoe UI, sans-serif"
            });
            colType.textContent = col.type + (col.nullable === false ? " ·" : "");
            g.appendChild(colType);

            if (i < cols.length - 1) {
              g.appendChild(mkSVG("line", { x1: 8, y1: y + ROW_H - 3, x2: COL_W - 8, y2: y + ROW_H - 3, stroke: "#e2e8f0", "stroke-width": 1 }));
            }
          });

          g.appendChild(mkSVG("rect", { x: 0, y: 0, width: COL_W, height: h, rx: 8, fill: "none", stroke: clr, "stroke-width": 1, "stroke-opacity": 0.45 }));
          g.appendChild(hit);
          tablesG.appendChild(g);
        });

        tablesG.querySelectorAll(".table-box").forEach(el => {
          const t = el.getAttribute("data-table");
          let dragging = false, startX = 0, startY = 0, origX = 0, origY = 0;
          el.addEventListener("mousedown", e => {
            if (e.target.closest(".col-row")) return;
            dragging = true;
            startX = e.clientX; startY = e.clientY;
            origX = positions[t].x; origY = positions[t].y;
            e.stopPropagation();
            hideTooltip();
          });
          window.addEventListener("mousemove", e => {
            if (!dragging) return;
            positions[t] = { x: origX + (e.clientX - startX) / panZoom.scale, y: origY + (e.clientY - startY) / panZoom.scale };
            el.setAttribute("transform", `translate(${positions[t].x},${positions[t].y})`);
            renderEdges();
          });
          window.addEventListener("mouseup", () => { dragging = false; });
        });
      }

      const panZoom = { x: 0, y: 0, scale: 1 };
      function applyTransform() {
        viewport.setAttribute("transform", `translate(${panZoom.x},${panZoom.y}) scale(${panZoom.scale})`);
      }
      let panning = false, panStartX = 0, panStartY = 0, panOrigX = 0, panOrigY = 0;
      svg.addEventListener("mousedown", e => {
        if (e.target === svg || e.target.id === "svg") {
          panning = true;
          panStartX = e.clientX; panStartY = e.clientY;
          panOrigX = panZoom.x; panOrigY = panZoom.y;
        }
      });
      window.addEventListener("mousemove", e => {
        if (!panning) return;
        panZoom.x = panOrigX + (e.clientX - panStartX);
        panZoom.y = panOrigY + (e.clientY - panStartY);
        applyTransform();
      });
      window.addEventListener("mouseup", () => { panning = false; });
      svg.addEventListener("wheel", e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const rect = svg.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        panZoom.x = mouseX - (mouseX - panZoom.x) * delta;
        panZoom.y = mouseY - (mouseY - panZoom.y) * delta;
        panZoom.scale = Math.min(3, Math.max(0.2, panZoom.scale * delta));
        applyTransform();
      }, { passive: false });

      function updateStats() {
        document.getElementById("stats").innerHTML =
          `<span style="color:#94a3b8">${MODULES[activeKey].label} — ${schema.tables.length} tablas · ${schema.refs.length} relaciones</span>`;
      }

      function switchModule(key) {
        activeKey = key;
        schema = buildSchemaForModule(key);
        computeLayout();
        panZoom.x = 0; panZoom.y = 0; panZoom.scale = 1;
        renderTables();
        renderEdges();
        applyTransform();
        updateStats();
        document.querySelectorAll("#tabs button").forEach(b => {
          b.classList.toggle("active", b.getAttribute("data-mod") === key);
        });
      }

      function initTabs() {
        const wrap = document.getElementById("tabs");
        Object.entries(MODULES).forEach(([k, m]) => {
          const b = document.createElement("button");
          b.type = "button";
          b.setAttribute("data-mod", k);
          b.textContent = m.label.split(" — ")[0];
          b.title = m.label;
          b.addEventListener("click", () => switchModule(k));
          wrap.appendChild(b);
        });
      }

      document.getElementById("search").addEventListener("input", e => {
        const q = e.target.value.trim().toLowerCase();
        tablesG.querySelectorAll(".table-box").forEach(el => {
          const t = el.getAttribute("data-table").toLowerCase();
          el.classList.toggle("dimmed", q.length > 0 && !t.includes(q));
        });
      });

      initTabs();
      computeLayout();
      switchModule(activeKey);
    </script>
  </body>
</html>
